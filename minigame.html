<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SYSTÈME-01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;font-family:'Share Tech Mono',monospace}
    #wrap{position:relative;width:640px;max-width:100vw}
    canvas{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges;background:#000;border:1px solid #0d1a0d}
    #hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
    #cassette-count{position:absolute;top:8px;left:8px;font-size:10px;color:#2a6a2a;letter-spacing:2px}
    #hint{position:absolute;top:8px;right:8px;font-size:8px;color:#152015;letter-spacing:1px;text-align:right;line-height:1.6}
    #dialog{position:absolute;bottom:8px;left:10px;right:10px;background:rgba(0,0,0,0.92);border:1px solid #1a4a1a;padding:10px 16px;font-size:11px;color:#2a8a2a;letter-spacing:1px;line-height:1.7;opacity:0;transition:opacity 0.3s;text-align:center}
    #dialog.on{opacity:1}
    #back-btn{display:none;position:absolute;bottom:-52px;left:50%;transform:translateX(-50%);background:transparent;border:1px solid #2a8a2a;color:#2a8a2a;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;padding:8px 24px;cursor:pointer;transition:all .2s}
    #back-btn:hover{background:#2a8a2a;color:#000}
    #gp-hint{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:8px;color:#1a3a1a;letter-spacing:2px;white-space:nowrap}
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="640" height="400"></canvas>
  <div id="hud">
    <div id="cassette-count">BOBINES 0/6</div>
    <div id="hint">ZQSD / WASD / D-PAD<br>A / ENTRÉE — confirmer</div>
    <div id="dialog"></div>
  </div>
  <button id="back-btn" onclick="location.href='bonus.html'">RETOUR AU BONUS</button>
  <div id="gp-hint"></div>
</div>
<script>
'use strict';
(() => {

// ═══════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════
const CW = 640, CH = 400, T = 20;
const MW = CW/T, MH = CH/T; // 32×20
const SPD = 1.8, PR = 5; // player speed, radius

// Couleurs
const C = {
  bg:     '#040804',
  wall:   '#080e08',
  wallH:  '#0d170d',
  floor:  '#060c06',
  room:   '#070e07',
  corr:   '#050a05',
  dot:    '#090f09',
  player: '#3acc3a',
  pDark:  '#1a6a1a',
  cass:   '#b89800',
  cassG:  'rgba(184,152,0,0.25)',
  portal: '#22cc22',
  pGlow:  'rgba(34,204,34,0.35)',
  brad:   '#6a0808',
  bradE:  '#cc1010',
  txt:    '#2a8a2a',
  dim:    '#0d1a0d',
  amber:  '#c0a010',
};

// ═══════════════════════════════════════
// CARTE
// ═══════════════════════════════════════
const map = Array.from({length:MH},()=>new Array(MW).fill(1));

function fi(x1,y1,x2,y2){
  for(let y=y1;y<=y2;y++) for(let x=x1;x<=x2;x++)
    if(x>=0&&x<MW&&y>=0&&y<MH) map[y][x]=0;
}

// Pièces du haut (rangée 1-4)
fi(1,1,5,4);   // CELLIER
fi(8,1,12,4);  // CUISINE
fi(15,1,19,4); // WC
fi(22,1,26,4); // S.BAIN

// Sorties pièces haut → couloir haut (rangée 5, 3 tuiles de large)
fi(2,5,4,5); fi(9,5,11,5); fi(16,5,18,5); fi(23,5,25,5);

// Couloir horizontal haut (rangées 6-8)
fi(1,6,30,8);

// Entrées pièces bas depuis couloir haut (rangée 9)
fi(2,9,4,9); fi(9,9,11,9);
// Couloirs verticaux WC et BAIN vers HALL
fi(16,9,18,14); fi(23,9,25,14);

// Pièces du bas (rangées 10-13)
fi(1,10,5,13);  // SALON
fi(8,10,12,13); // S.MANGER

// Sorties pièces bas → HALL (rangée 14)
fi(2,14,4,14); fi(9,14,11,14);

// HALL (rangées 15-18)
fi(1,15,30,18);

// Étiquettes des zones (pour rendu)
const ZONES = [
  {name:'CELLIER',    x:1,y:1,w:5,h:4},
  {name:'CUISINE',    x:8,y:1,w:5,h:4},
  {name:'WC',         x:15,y:1,w:5,h:4},
  {name:'S.BAIN',     x:22,y:1,w:5,h:4},
  {name:'SALON',      x:1,y:10,w:5,h:4},
  {name:'S.MANGER',   x:8,y:10,w:5,h:4},
  {name:'COULOIR',    x:1,y:6,w:30,h:3},
  {name:'HALL',       x:1,y:15,w:30,h:4},
];

// ═══════════════════════════════════════
// BOBINES
// ═══════════════════════════════════════
const CASSETTES = [
  {tx:3,ty:2, texts:[
    "CELLIER — ENTRÉE DE SERVICE",
    "\"Les caméras ont été installées le 14 octobre.",
    "Brad Bitt a été activé le soir même.\"",
  ]},
  {tx:10,ty:2, texts:[
    "CUISINE — JOURNAL DE BORD, NUIT 3",
    "\"Brad bouge alors que je ne lui ai rien demandé.",
    "Je ne comprends pas comment c'est possible.\"",
  ]},
  {tx:17,ty:2, texts:[
    "WC — PHOTO SANS DATE",
    "\"Une silhouette dans le couloir.",
    "Aucun système n'était censé être actif.\"",
  ]},
  {tx:24,ty:2, texts:[
    "S.BAIN — PLAN DU BÂTIMENT",
    "\"Certaines pièces sont barrées à la main en rouge.",
    "La pièce du fond n'est pas sur le plan officiel.\"",
  ]},
  {tx:3,ty:12, texts:[
    "SALON — ENREGISTREMENT AUDIO",
    "\"[Statique] ... une respiration.",
    "[Silence] ... un bruit de pas. Lents.\"",
  ]},
  {tx:10,ty:12, texts:[
    "S.MANGER — DERNIER MESSAGE",
    "\"Si tu trouves ces cassettes, sors par où tu es entré.",
    "Ne suis pas la lumière. N'ouvre pas le portail.\"",
  ]},
];
CASSETTES.forEach(c=>c.collected=false);

// Portail
const PTX=25, PTY=17;
let portalActive=false, portalPulse=0;

// ═══════════════════════════════════════
// JOUEUR
// ═══════════════════════════════════════
const P = {
  px: 5.5*T, py: 17.5*T,
  vx: 0, vy: 0,
  facing: 'down',
  footT: 0, animT: 0,
};

// ═══════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════
let phase='intro'; // intro|play|fade|title|done
let collected=0;
let anomaly=null;       // {px,py,life,maxLife}
let anomalyCD=0;        // frames avant prochain
let fade=0;
let titleT=0;
let introStep=0;
let introT=0;
let confirmHeld=false;

const INTRO=[
  {t:100, lines:["SYSTÈME DE SURVEILLANCE 01","","Connexion établie — 23h47"]},
  {t:120, lines:["Le gardien de nuit prend son poste.","","Quelque chose ne va pas."]},
  {t:130, lines:["Des bobines d'enregistrement","ont été éparpillées dans la maison.","Retrouvez-les toutes."]},
  {t:130, lines:["Une fois réunies...","le portail s'ouvrira.","","Ne vous demandez pas pourquoi."]},
  {t:999, lines:["▶ APPUYER SUR A / ENTRÉE / CLIC"]},
];

// ═══════════════════════════════════════
// AUDIO (Web Audio API — sons 8-bit)
// ═══════════════════════════════════════
let AC=null;
function initAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}

function tone(freq,dur,type='square',vol=0.22,t0=0){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  const ts=AC.currentTime+t0;
  g.gain.setValueAtTime(vol,ts);
  g.gain.exponentialRampToValueAtTime(0.001,ts+dur);
  o.start(ts);o.stop(ts+dur+0.01);
}

function sndCollect(){
  [523,659,784,1047].forEach((f,i)=>tone(f,0.1,'square',0.2,i*0.08));
}
function sndStep(){
  if(Math.random()>0.35)return;
  tone(45+Math.random()*20,0.04,'square',0.07);
}
function sndAnomaly(){
  [160,120,95,75].forEach((f,i)=>tone(f,0.22,'sawtooth',0.32,i*0.13));
  tone(30,0.8,'sine',0.15,0.1);
}
function sndPortalOpen(){
  [262,330,392,523,659,784,1047,1319].forEach((f,i)=>tone(f,0.3,'sine',0.28,i*0.09));
}
function sndIntroBeep(){tone(440,0.08,'square',0.18);}
function sndPortalEntry(){
  for(let i=0;i<6;i++) tone(100+i*80,0.5,'sine',0.2,i*0.12);
  tone(40,2,'sine',0.3,0.4);
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true; initAC();
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','z','q','d','s','w',' ','Enter'].includes(e.key))
    e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
document.addEventListener('click',()=>initAC());

let gp=null;const prevGP={};
window.addEventListener('gamepadconnected',()=>{
  document.getElementById('gp-hint').textContent='Manette connectée — D-PAD: déplacer · A: confirmer';
});
window.addEventListener('gamepaddisconnected',()=>{
  document.getElementById('gp-hint').textContent='';
});

function pollGP(){
  const gps=navigator.getGamepads?Array.from(navigator.getGamepads()).filter(Boolean):[];
  gp=gps[0]||null;
}

function inp(){
  const r={l:false,r:false,u:false,d:false,ok:false};
  if(keys['ArrowLeft']||keys['q']||keys['a'])r.l=true;
  if(keys['ArrowRight']||keys['d'])r.r=true;
  if(keys['ArrowUp']||keys['z']||keys['w'])r.u=true;
  if(keys['ArrowDown']||keys['s'])r.d=true;
  if(keys['Enter']||keys[' '])r.ok=true;
  if(gp){
    if(gp.axes[0]<-0.3||gp.buttons[14]?.pressed)r.l=true;
    if(gp.axes[0]>0.3||gp.buttons[15]?.pressed)r.r=true;
    if(gp.axes[1]<-0.3||gp.buttons[12]?.pressed)r.u=true;
    if(gp.axes[1]>0.3||gp.buttons[13]?.pressed)r.d=true;
    if(gp.buttons[0]?.pressed||gp.buttons[2]?.pressed)r.ok=true;
  }
  return r;
}

// ═══════════════════════════════════════
// DIALOGUE
// ═══════════════════════════════════════
let dlgLines=[],dlgIdx=0,dlgT=0;
const dlgEl=document.getElementById('dialog');

function showDlg(lines,autoclose=200){
  dlgLines=lines; dlgIdx=0;
  dlgEl.textContent=lines[0]||'';
  dlgEl.classList.add('on');
  dlgT=autoclose;
}
function advDlg(){
  if(!dlgEl.classList.contains('on'))return;
  dlgIdx++;
  if(dlgIdx>=dlgLines.length){
    dlgEl.classList.remove('on');
    dlgLines=[]; dlgT=0;
  } else {
    dlgEl.textContent=dlgLines[dlgIdx];
    dlgT=220;
  }
}

// ═══════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════
function tile(px,py){
  const tx=Math.floor(px/T),ty=Math.floor(py/T);
  if(tx<0||tx>=MW||ty<0||ty>=MH)return 1;
  return map[ty][tx];
}
function walkable(px,py){
  return tile(px-PR,py-PR)===0&&tile(px+PR,py-PR)===0&&
         tile(px-PR,py+PR)===0&&tile(px+PR,py+PR)===0;
}

// ═══════════════════════════════════════
// CANVAS + RENDU
// ═══════════════════════════════════════
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;

// Identifie si une tuile appartient à une zone de pièce (pas couloir/hall)
function isRoom(x,y){
  return ZONES.some(z=>z.name!=='COULOIR'&&z.name!=='HALL'&&
    x>=z.x&&x<z.x+z.w&&y>=z.y&&y<z.y+z.h);
}

function drawMap(){
  for(let y=0;y<MH;y++){
    for(let x=0;x<MW;x++){
      if(map[y][x]===0){
        cx.fillStyle=isRoom(x,y)?C.room:C.corr;
        cx.fillRect(x*T,y*T,T,T);
        if((x+y)%2===0){cx.fillStyle=C.dot;cx.fillRect(x*T+9,y*T+9,2,2);}
      } else {
        cx.fillStyle=C.wall;cx.fillRect(x*T,y*T,T,T);
        cx.fillStyle=C.wallH;cx.fillRect(x*T,y*T,T,1);
        cx.fillRect(x*T,y*T,1,T);
      }
    }
  }
  // Étiquettes
  cx.font='6px monospace';cx.textAlign='center';
  ZONES.forEach(z=>{
    if(z.name==='COULOIR'||z.name==='HALL')return;
    cx.fillStyle='#183018';
    cx.fillText(z.name,(z.x+z.w/2)*T,(z.y+z.h/2)*T+2);
  });
  cx.fillStyle='#0f200f';
  cx.fillText('COULOIR',(1+30/2)*T,7*T+2);
  cx.fillText('HALL',(1+30/2)*T,17*T+2);
}

function drawCassettes(){
  const t=Date.now()/1000;
  CASSETTES.forEach(c=>{
    if(c.collected)return;
    const cx2=(c.tx+0.5)*T, cy2=(c.ty+0.5)*T;
    // Lueur
    const g=cx.createRadialGradient(cx2,cy2,1,cx2,cy2,10);
    g.addColorStop(0,C.cassG);g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.beginPath();cx.arc(cx2,cy2,10,0,Math.PI*2);cx.fill();
    // Bobine (pixel-art)
    const blink=Math.sin(t*5)*0.25+0.75;
    cx.globalAlpha=blink;
    cx.fillStyle=C.cass;
    cx.fillRect(cx2-5,cy2-4,10,7);  // corps
    cx.fillRect(cx2-6,cy2-2,2,4);   // flanc gauche
    cx.fillRect(cx2+4,cy2-2,2,4);   // flanc droit
    cx.fillStyle='#0a0a00';
    cx.fillRect(cx2-2,cy2-2,4,4);   // trou central
    cx.globalAlpha=1;
  });
}

function drawPortal(){
  const px2=(PTX+0.5)*T, py2=(PTY+0.5)*T;
  const t=Date.now()/1000;
  portalPulse=Math.sin(t*3)*0.15+0.85;

  // Base (portail inactif = simple rectangle sombre)
  const col=portalActive?C.portal:'#183018';
  cx.strokeStyle=col;cx.lineWidth=portalActive?2:1;
  cx.strokeRect(px2-7,py2-12,14,22);

  if(portalActive){
    // Lueur
    const g2=cx.createRadialGradient(px2,py2,3,px2,py2,22*portalPulse);
    g2.addColorStop(0,'rgba(34,204,34,0.4)');g2.addColorStop(1,'transparent');
    cx.fillStyle=g2;cx.beginPath();cx.arc(px2,py2,22,0,Math.PI*2);cx.fill();
    // Intérieur animé
    cx.fillStyle=`rgba(34,204,34,${0.12*portalPulse})`;
    cx.fillRect(px2-6,py2-11,12,20);
    // Particules orbitales
    for(let i=0;i<4;i++){
      const a=t*2.5+i*Math.PI/2;
      const r=10+Math.sin(t*4+i)*3;
      cx.fillStyle='#44ff44';
      cx.fillRect(px2+Math.cos(a)*r-1,py2+Math.sin(a)*r-1,2,2);
    }
  } else {
    cx.fillStyle='#020402';
    cx.fillRect(px2-6,py2-11,12,20);
  }

  cx.font='5px monospace';cx.textAlign='center';
  cx.fillStyle=portalActive?C.portal:'#1a3a1a';
  cx.fillText('PORTAIL',px2,py2+15);
}

function drawPlayer(){
  const px=P.px,py=P.py;
  // Ombre
  cx.fillStyle='rgba(0,0,0,0.35)';
  cx.beginPath();cx.ellipse(px,py+7,6,3,0,0,Math.PI*2);cx.fill();
  // Lumière de torche (cone directionnel)
  const dir={down:Math.PI/2,up:-Math.PI/2,left:Math.PI,right:0}[P.facing];
  const lg=cx.createRadialGradient(px,py,4,px,py,55);
  lg.addColorStop(0,'rgba(80,160,80,0.14)');lg.addColorStop(1,'transparent');
  cx.fillStyle=lg;
  cx.beginPath();cx.moveTo(px,py);
  cx.arc(px,py,55,dir-0.55,dir+0.55);cx.closePath();cx.fill();
  // Corps
  cx.fillStyle=C.player;
  cx.fillRect(px-4,py-8,8,13);
  cx.fillRect(px-3,py-14,6,7);
  // Yeux
  cx.fillStyle=C.pDark;
  if(P.facing==='down'){cx.fillRect(px-2,py-11,2,2);cx.fillRect(px+1,py-11,2,2);}
  else if(P.facing==='left'){cx.fillRect(px-3,py-11,2,2);}
  else if(P.facing==='right'){cx.fillRect(px+2,py-11,2,2);}
}

function drawAnomaly(){
  if(!anomaly)return;
  const t=anomaly.life/anomaly.maxLife;
  const a=t<0.15?t/0.15:t>0.75?(1-t)/0.25:1;
  cx.globalAlpha=a*0.75;
  // Silhouette Brad
  cx.fillStyle=C.brad;
  cx.fillRect(anomaly.px-6,anomaly.py-20,12,22);
  cx.fillRect(anomaly.px-4,anomaly.py-28,8,10);
  cx.fillStyle=C.bradE;
  cx.fillRect(anomaly.px-3,anomaly.py-25,2,2);
  cx.fillRect(anomaly.px+1,anomaly.py-25,2,2);
  cx.globalAlpha=1;
}

function drawScanlines(){
  for(let y=0;y<CH;y+=2){
    cx.fillStyle='rgba(0,0,0,0.06)';cx.fillRect(0,y,CW,1);
  }
  const vg=cx.createRadialGradient(CW/2,CH/2,CH*0.28,CW/2,CH/2,CH*0.72);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.45)');
  cx.fillStyle=vg;cx.fillRect(0,0,CW,CH);
}

function drawFade(){
  if(fade>0){cx.fillStyle=`rgba(0,0,0,${fade})`;cx.fillRect(0,0,CW,CH);}
}

// ── INTRO ──
function drawIntro(){
  cx.fillStyle='#000';cx.fillRect(0,0,CW,CH);
  const s=INTRO[Math.min(introStep,INTRO.length-1)];
  cx.textAlign='center';
  s.lines.forEach((line,i)=>{
    const isTitle=i===0&&introStep===0;
    cx.font=isTitle?'bold 13px monospace':'11px monospace';
    cx.fillStyle=line===''?'transparent':line.startsWith('▶')?C.amber:C.txt;
    cx.fillText(line,CW/2,CH/2+(i-s.lines.length/2+0.5)*20);
  });
  // Header
  cx.font='9px monospace';cx.fillStyle='#1a3a1a';
  cx.fillText('SYSTÈME-01 — LA DERNIÈRE RONDE',CW/2,22);
  // Cursor clignotant sur dernière étape
  if(introStep>=INTRO.length-1&&Math.floor(Date.now()/500)%2){
    cx.fillStyle=C.amber;cx.fillRect(CW/2+40,CH/2+6,8,2);
  }
  // Scanlines
  for(let y=0;y<CH;y+=2){cx.fillStyle='rgba(0,0,0,0.07)';cx.fillRect(0,y,CW,1);}
}

// ── TITLE CARD ──
function drawTitle(){
  cx.fillStyle='#000';cx.fillRect(0,0,CW,CH);
  if(titleT<40)return;
  const a=Math.min(1,(titleT-40)/50);
  cx.globalAlpha=a;
  cx.textAlign='center';
  // "Brad Bitt" — grand, phosphore vert
  cx.font='bold 52px monospace';cx.fillStyle=C.portal;
  cx.fillText('BRAD BITT',CW/2,CH/2-18);
  // "mais le jeu"
  cx.font='16px monospace';cx.fillStyle='#1a8a1a';
  cx.fillText('mais le jeu',CW/2,CH/2+18);
  // Séparateur
  cx.fillStyle='#1a3a1a';
  cx.fillRect(CW/2-60,CH/2+30,120,1);
  // "Été 2026"
  cx.font='13px monospace';cx.fillStyle=C.amber;
  cx.fillText('ÉTÉ 2026',CW/2,CH/2+52);
  cx.globalAlpha=1;
  // Bouton retour après 5s
  if(titleT>250){document.getElementById('back-btn').style.display='block';}
}

// ═══════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════
let prevOK=false;

function update(){
  pollGP();
  const ip=inp();

  // Confirm press (rising edge)
  const okPress=ip.ok&&!prevOK;
  prevOK=ip.ok;

  if(phase==='intro'){
    introT++;
    if(introT>=(INTRO[introStep]?.t||120)){
      introT=0;
      if(introStep<INTRO.length-1){introStep++;sndIntroBeep();}
    }
    if(okPress&&introStep>=INTRO.length-1){phase='play';initAC();}
    return;
  }

  if(phase==='title'){
    titleT++;
    return;
  }

  if(phase==='fade'){
    fade=Math.min(1,fade+0.018);
    if(fade>=1){phase='title';titleT=0;sndPortalEntry();}
    return;
  }

  if(phase!=='play')return;

  // ── Mouvement ──
  let dx=0,dy=0;
  if(ip.l){dx-=SPD;P.facing='left';}
  if(ip.r){dx+=SPD;P.facing='right';}
  if(ip.u){dy-=SPD;P.facing='up';}
  if(ip.d){dy+=SPD;P.facing='down';}
  if(dx&&dy){dx*=0.707;dy*=0.707;}

  if(dx&&walkable(P.px+dx,P.py))P.px+=dx;
  if(dy&&walkable(P.px,P.py+dy))P.py+=dy;

  // Pas
  if(dx||dy){
    P.footT++;
    if(P.footT>14){P.footT=0;sndStep();}
  }

  // ── Avancer le dialogue ──
  if(dlgT>0){dlgT--;if(dlgT===0&&dlgEl.classList.contains('on'))advDlg();}

  // ── Collecte bobines ──
  CASSETTES.forEach(c=>{
    if(c.collected)return;
    const cpx=(c.tx+0.5)*T, cpy=(c.ty+0.5)*T;
    if(Math.hypot(P.px-cpx,P.py-cpy)<T*0.65){
      c.collected=true;collected++;
      sndCollect();
      showDlg(c.texts,260);
      document.getElementById('cassette-count').textContent=`BOBINES ${collected}/6`;
      if(collected===3){anomalyCD=240;}
      if(collected===6){
        setTimeout(()=>{
          portalActive=true;sndPortalOpen();
          showDlg(["Toutes les bobines réunies."," ","Le portail s'illumine.",
            "\"N'ouvre pas la porte du fond.\"","... Il est trop tard pour ça."],280);
        },800);
      }
    }
  });

  // ── Portail ──
  if(portalActive){
    const dpx=(PTX+0.5)*T, dpy=(PTY+0.5)*T;
    if(Math.hypot(P.px-dpx,P.py-dpy)<T*0.7){
      phase='fade';
    }
  }

  // ── Anomalie Brad ──
  if(collected>=3&&anomalyCD>0){
    anomalyCD--;
    if(anomalyCD===0){
      // Placer Brad dans le couloir
      const spots=[];
      for(let y=6;y<=8;y++) for(let x=2;x<=29;x++) if(map[y][x]===0) spots.push({x,y});
      if(spots.length){
        const s=spots[Math.floor(Math.random()*spots.length)];
        anomaly={px:(s.x+0.5)*T,py:(s.y+0.5)*T,life:0,maxLife:80};
        sndAnomaly();
      }
      anomalyCD=360+Math.floor(Math.random()*240);
    }
  }
  if(anomaly){anomaly.life++;if(anomaly.life>=anomaly.maxLife)anomaly=null;}
}

// ═══════════════════════════════════════
// BOUCLE PRINCIPALE
// ═══════════════════════════════════════
function render(){
  cx.fillStyle=C.bg;cx.fillRect(0,0,CW,CH);
  if(phase==='intro'){drawIntro();return;}
  if(phase==='title'){drawTitle();return;}
  drawMap();
  drawCassettes();
  drawPortal();
  drawAnomaly();
  drawPlayer();
  drawScanlines();
  drawFade();
}

function loop(){update();render();requestAnimationFrame(loop);}
loop();

})();
</script>
